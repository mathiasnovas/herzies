name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'

jobs:
  build:
    name: Build macOS
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
      HAS_APPLE_ID: ${{ secrets.APPLE_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @herzies/shared build

      - name: Import signing certificate
        if: env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          CERT_PATH=$RUNNER_TEMP/certificate.p12

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Inspect signing identities
        if: env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "=== Codesigning identities in temp keychain ==="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
          echo ""
          echo "=== Codesigning identities across all search list ==="
          security find-identity -v -p codesigning || true
          echo ""
          echo "=== Match check for APPLE_SIGNING_IDENTITY ==="
          security find-identity -v -p codesigning -s "$APPLE_SIGNING_IDENTITY" "$KEYCHAIN_PATH" || true
          echo ""
          echo "Length of APPLE_SIGNING_IDENTITY secret: ${#APPLE_SIGNING_IDENTITY}"

      - name: Build universal binary
        working-directory: packages/desktop
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target universal-apple-darwin

      - name: Notarize
        if: env.HAS_APPLE_ID == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG=$(find packages/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' | head -1)
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r .version packages/desktop/src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Herzies-${{ steps.version.outputs.version }}-universal.dmg
          path: packages/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

      - name: Build updater manifest
        id: manifest
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BUNDLE_DIR=packages/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos
          TARGZ=$(find "$BUNDLE_DIR" -name '*.app.tar.gz' | head -1)
          SIG_FILE="${TARGZ}.sig"

          if [ -z "$TARGZ" ] || [ ! -f "$SIG_FILE" ]; then
            echo "error: updater artifacts not found — is TAURI_SIGNING_PRIVATE_KEY set and createUpdaterArtifacts enabled?" >&2
            ls -la "$BUNDLE_DIR" >&2 || true
            exit 1
          fi

          SIG_CONTENT=$(cat "$SIG_FILE")
          TARGZ_NAME=$(basename "$TARGZ")
          DOWNLOAD_URL="https://github.com/Herzies/herzies/releases/download/desktop-v${VERSION}/${TARGZ_NAME}"

          # Universal binary: both architectures point at the same .app.tar.gz.
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg sig "$SIG_CONTENT" \
            --arg url "$DOWNLOAD_URL" \
            '{
              version: $version,
              notes: ("Herzies Desktop v" + $version),
              pub_date: $pub_date,
              platforms: {
                "darwin-x86_64":  { signature: $sig, url: $url },
                "darwin-aarch64": { signature: $sig, url: $url }
              }
            }' > latest.json

          echo "targz=$TARGZ" >> "$GITHUB_OUTPUT"
          echo "sig=$SIG_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DMG=$(find packages/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' | head -1)
          gh release create "desktop-v${VERSION}" \
            "$DMG" \
            "${{ steps.manifest.outputs.targz }}" \
            "${{ steps.manifest.outputs.sig }}" \
            latest.json \
            --title "Herzies Desktop v${VERSION}" \
            --generate-notes \
            --target main
